<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Doação de sangue</h1>
    </header>
    <main>
        <form id="form_doacao">
            <label for="nome">Informe seu nome completo: </label><br>
            <input type="text" name="nome" id="nome" placeholder="Nome Completo"><br>

            <label for="email">Informe seu email: </label><br>
            <input type="email" name="email" id="email" placeholder="@gmail.com"><br>

            <label for="idade">Informe sua data de nascimento: </label><br>
            <input type="date" name="idade" id="idade"><br>

            <label for="peso">Informe seu peso: </label><br>
            <input type="number" name="peso" id="peso"><br>

            <label for="tipo_s">Informe o seu tipo sanguíneo: </label><br>
            <select name="tipo_s" id="tipo_s">
                <option value="+A">+A</option>
                <option value="-A">-A</option>
                <option value="+B">+B</option>
                <option value="-B">-B</option>
                <option value="+AB">+AB</option>
                <option value="-AB">-AB</option>
                <option value="+O">+O</option>
                <option value="-O">-O</option>
            </select>
            <br>

            <label for="telefone">Informe seu telefone: </label><br>
            <input type="tel" name="telefone" id="telefone"><br>

            <label for="cidade">Informe sua cidade: </label><br>
            <input type="text" name="cidade" id="cidade"><br>

            <label for="estado">Informe seu estado: </label><br>
            <input type="text" name="estado" id="estado"><br>

            <button type="submit">Enviar</button>
        </form>
    </main>




    <script src="scripts/script.js"></script>
</body>
</html>
