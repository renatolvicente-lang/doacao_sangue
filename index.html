<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de Sangue</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <img src="https://cdn-icons-png.flaticon.com/512/7496/7496604.png" alt="">
        <h1>Doação de sangue</h1>
        <p></p>
    </header>
    <main>
        <form id="form_doacao">
            <label for="nome"><b>Informe seu nome completo:</b> </label><br>
            <input type="text" name="nome" id="nome" placeholder="Nome Completo"><br>

            <label for="email"><b>Informe seu email:</b> </label><br>
            <input type="email" name="email" id="email" placeholder="@gmail.com"><br>

            <label for="idade"><b>Informe sua data de nascimento:</b> </label><br>
            <input type="date" name="idade" id="idade"><br>

            <label for="peso"><b>Informe seu peso:</b> </label><br>
            <input type="number" name="peso" id="peso"><br>

            <label for="tipo_s"><b>Informe o seu tipo sanguíneo:</b> </label><br>
            <select name="tipo_s" id="tipo_s">
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
            <br>

            <label for="telefone"><b>Informe seu telefone:</b> </label><br>
            <input type="tel" name="telefone" id="telefone"><br>

            <label for="cidade"><b>Informe sua cidade:</b> </label><br>
            <input type="text" name="cidade" id="cidade"><br>

            <label for="estado"><b>Informe seu estado:</b> </label><br>
            <input type="text" name="estado" id="estado"><br>

            <button type="submit" id="button">Enviar</button>
        </form>
    </main>




    <script src="scripts/script.js"></script>
</body>
</html>
